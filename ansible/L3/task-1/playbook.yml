---
- name: Create files and symlinks on app servers
  hosts: all
  become: yes
  gather_facts: false
  tasks:
    - name: Create blog.txt on stapp01
      file:
        path: /opt/itadmin/blog.txt
        state: touch
        owner: tony
        group: tony
      when: inventory_hostname == 'stapp01'

    - name: Create story.txt on stapp02
      file:
        path: /opt/itadmin/story.txt
        state: touch
        owner: steve
        group: steve
      when: inventory_hostname == 'stapp02'

    - name: Create media.txt on stapp03
      file:
        path: /opt/itadmin/media.txt
        state: touch
        owner: banner
        group: banner
      when: inventory_hostname == 'stapp03'

    - name: Create symlink on all app servers
      file:
        src: /opt/itadmin
        dest: /var/www/html
        state: link
